<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us on WhatsApp</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
        }
        .container {
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            max-width: 420px;
            width: 90%;
        }
        .whatsapp-icon {
            font-size: 80px;
            margin-bottom: 20px;
            display: block;
        }
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }
        .subtitle {
            color: #666;
            margin-bottom: 8px;
            font-size: 16px;
        }
        p {
            color: #666;
            margin-bottom: 30px;
            line-height: 1.6;
            font-size: 15px;
        }
        .btn-whatsapp {
            display: inline-block;
            background: #25D366;
            color: white;
            padding: 15px 40px;
            border-radius: 50px;
            text-decoration: none;
            font-size: 18px;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(37, 211, 102, 0.3);
            border: none;
            cursor: pointer;
            width: 100%;
            max-width: 280px;
        }
        .btn-whatsapp:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(37, 211, 102, 0.4);
            background: #20b858;
        }
        .btn-whatsapp:active {
            transform: translateY(0);
        }
        .auto-redirect {
            margin-top: 20px;
            color: #999;
            font-size: 14px;
        }
        .countdown {
            color: #25D366;
            font-weight: bold;
            font-size: 20px;
        }
        .status-message {
            margin-top: 15px;
            padding: 10px;
            border-radius: 8px;
            font-size: 14px;
            display: none;
        }
        .status-message.show {
            display: block;
        }
        .status-message.info {
            background: #e3f2fd;
            color: #1976d2;
        }
        .status-message.warning {
            background: #fff3e0;
            color: #f57c00;
        }
        .skip-link {
            display: inline-block;
            margin-top: 12px;
            color: #667eea;
            font-size: 13px;
            text-decoration: none;
            cursor: pointer;
        }
        .skip-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <span class="whatsapp-icon">💬</span>
        <h1>Contact Us</h1>
        <p class="subtitle">We're here to help!</p>
        <p>Click the button below to start a conversation with us on WhatsApp</p>
        
        <button class="btn-whatsapp" id="whatsappBtn">
            📱 Open WhatsApp
        </button>
        
        <div class="auto-redirect">
            Redirecting in <span class="countdown" id="countdown">5</span> seconds...
        </div>
        
        <a href="#" class="skip-link" id="skipLink">Skip wait & redirect now →</a>
        
        <div class="status-message" id="statusMessage"></div>
    </div>

    <script>
        // WhatsApp configuration
        const WHATSAPP_URL = 'https://wa.me/886982200282';
        
        function redirectToWhatsApp() {
            window.location.href = WHATSAPP_URL;
        }
        
        function showMessage(text, type = 'info') {
            const msg = document.getElementById('statusMessage');
            msg.textContent = text;
            msg.className = `status-message show ${type}`;
            
            setTimeout(() => {
                msg.className = 'status-message';
            }, 3000);
        }
        
        // Countdown timer
        let seconds = 5;
        const countdownElement = document.getElementById('countdown');
        let timer = null;
        
        function startCountdown() {
            timer = setInterval(() => {
                seconds--;
                countdownElement.textContent = seconds;
                
                if (seconds <= 0) {
                    clearInterval(timer);
                    redirectToWhatsApp();
                }
            }, 1000);
        }
        
        function stopCountdown() {
            if (timer) {
                clearInterval(timer);
                timer = null;
            }
        }
        
        // Main button click
        document.getElementById('whatsappBtn').addEventListener('click', function() {
            stopCountdown();
            redirectToWhatsApp();
        });
        
        // Skip link click
        document.getElementById('skipLink').addEventListener('click', function(e) {
            e.preventDefault();
            stopCountdown();
            redirectToWhatsApp();
        });
        
        // Detect WeChat/QQ built-in browsers
        function isWechatBrowser() {
            return /MicroMessenger/i.test(navigator.userAgent);
        }
        
        function isQQBrowser() {
            return /QQ/i.test(navigator.userAgent);
        }
        
        // If in WeChat/QQ browser, give warning
        if (isWechatBrowser() || isQQBrowser()) {
            showMessage('⚠️ Please tap "..." and select "Open in Browser"', 'warning');
            seconds = 10;
            countdownElement.textContent = seconds;
        }
        
        // Check if on mobile device
        function isMobileDevice() {
            return /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
        }
        
        // If desktop, show helpful message
        if (!isMobileDevice()) {
            showMessage('💡 WhatsApp Web will open in a new tab', 'info');
        }
        
        // Start countdown when page loads
        startCountdown();
    </script>
</body>
</html>

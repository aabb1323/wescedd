    /* ===== Reset & Font ===== */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;

      color: #e5e7eb;

      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }
    ::selection { background: #d4a853; color: #0a0a0f; }

    /* ===== Header ===== */
    .page-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 20px;
      padding-bottom: 16px;
      border-bottom: 1px solid rgba(212, 168, 83, 0.15);
    }
    .page-header h1 {
      font-size: 24px;
      font-weight: 300;
      color: #ffffff;
      letter-spacing: 0.5px;
    }
    .page-header h1 strong { color: #d4a853; font-weight: 600; }

    /* ===== Banner ===== */
    .info-banner {
      background: rgba(212, 168, 83, 0.06);
      border: 1px solid rgba(212, 168, 83, 0.15);
      border-radius: 40px;
      padding: 10px 16px;
      text-align: center;
      margin-bottom: 24px;
      color: #d4a853;
      font-weight: 500;
      font-size: 14px;
      letter-spacing: 0.3px;
    }

    /* ===== Contact Banner ===== */
    .contact-banner {
      background: linear-gradient(135deg, rgba(212, 168, 83, 0.08), rgba(212, 168, 83, 0.02));
      border: 1px solid #d4a853;
      border-radius: 16px;
      padding: 16px 18px;
      margin-bottom: 28px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;
      box-shadow: 0 0 25px rgba(212, 168, 83, 0.03);
    }
    .contact-banner .label {
      font-size: 15px;
      font-weight: 500;
      color: #e5e7eb;
    }
    .contact-banner .links { display: flex; gap: 12px; }
    .contact-banner .links a {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border-radius: 40px;
      font-size: 13px;
      font-weight: 600;
      color: #ffffff;
      text-decoration: none;
      transition: 0.2s;
    }
    .contact-banner .links a:active { transform: scale(0.95); }
    .contact-banner .links .wa { background: #25D366; }
    .contact-banner .links .tg { background: #0088cc; }

    /* ===== Search Box ===== */
    .search-box {
      display: flex;
      align-items: center;
      gap: 12px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 40px;
      padding: 12px 18px;
      margin-bottom: 28px;
      transition: 0.3s;
    }
    .search-box:focus-within {
      border-color: #d4a853;
      box-shadow: 0 0 20px rgba(212, 168, 83, 0.04);
    }
    .search-box .icon { color: #6b7280; font-size: 16px; margin-right: 8px; }
    .search-box input {
      background: transparent;
      border: none;
      color: #ffffff;
      font-size: 16px;
      width: 100%;
      outline: none;
      font-family: inherit;
    }
    .search-box input::placeholder { color: #6b7280; font-weight: 300; }

    /* ===== Product Grid ===== */
    .product-grid { display: flex; flex-direction: column; gap: 12px; }
    .product-card {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.04);
      border-radius: 16px;
      padding: 16px 18px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: 0.2s;
      -webkit-tap-highlight-color: transparent;
    }
    .product-card:active {
      background: rgba(212, 168, 83, 0.04);
      transform: scale(0.99);
    }
    .product-info {
      display: flex;
      flex-direction: column;
      gap: 4px;
      flex: 1;
      min-width: 0;
    }
    .product-sku {
      font-size: 12px;
      font-weight: 600;
      color: #d4a853;
      letter-spacing: 0.5px;
    }
    .product-name {
      font-size: 16px;
      font-weight: 600;
      color: #ffffff;
      line-height: 1.3;
      word-break: break-word;
    }
    .product-spec {
      font-size: 13px;
      color: #9ca3af;
      font-weight: 400;
    }
    .product-price {
      text-align: right;
      flex-shrink: 0;
      margin-left: 12px;
    }
    .product-price .amount {
      font-size: 18px;
      font-weight: 700;
      color: #d4a853;
      white-space: nowrap;
    }

    /* ===== No Results ===== */
    .no-results {
      display: none;
      text-align: center;
      padding: 60px 20px;
      color: #6b7280;
    }
    .no-results .icon { font-size: 36px; margin-bottom: 12px; opacity: 0.5; }

    /* ===== Footer ===== */
    .footer-note {
      margin-top: 30px;
      text-align: center;
      color: #6b7280;
      font-size: 12px;
      border-top: 1px solid rgba(255, 255, 255, 0.04);
      padding-top: 20px;
    }
    .footer-note a { color: #d4a853; text-decoration: none; }

    /* ===== Floating Buttons ===== */
    .floating-buttons {
      position: fixed;
      bottom: 24px;
      right: 20px;
      z-index: 999;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .float-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      color: #fff;
      font-size: 28px;
      text-decoration: none;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.6);
      transition: all 0.2s ease;
      border: none;
      -webkit-tap-highlight-color: transparent;
      animation: floatGlow 2.5s ease-in-out infinite;
    }
    .float-btn:nth-child(2) { animation-delay: 0.3s; }
    .float-btn:active { transform: scale(0.92); }
    .float-btn.wa { background: #25D366; }
    .float-btn.tg { background: #0088cc; }

    @keyframes floatGlow {
      0% { box-shadow: 0 4px 20px rgba(0, 0, 0, 0.6); }
      50% { box-shadow: 0 0 30px rgba(212, 168, 83, 0.2); }
      100% { box-shadow: 0 4px 20px rgba(0, 0, 0, 0.6); }
    }

    /* ===== Desktop ===== */
    @media (hover: hover) {
      .float-btn:hover { transform: scale(1.06); }
      .product-card:hover { background: rgba(255, 255, 255, 0.04); border-color: rgba(212, 168, 83, 0.1); }
      .contact-banner .links a:hover { transform: scale(1.02); }
    }
    @media (min-width: 640px) {
      body { padding: 30px 24px 140px; max-width: 800px; margin: 0 auto; }
      .page-header h1 { font-size: 32px; }
      .product-card { padding: 20px 24px; border-radius: 20px; }
      .product-name { font-size: 18px; }

      .float-btn { width: 68px; height: 68px; font-size: 30px; }
      .contact-banner { padding: 18px 24px; }
    }
    @media (min-width: 1024px) {
      body { padding: 40px 32px 160px; max-width: 960px; }
      .product-grid { gap: 16px; }
    }
